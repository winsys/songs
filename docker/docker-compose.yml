# Offline copy of songs.winsys.lv for LAN use without internet.
# Quick start (see docs/offline-server.md for the full runbook):
#   1. tools\offline_sync.cmd      — pull DB dump, secrets and media from production
#   2. cd docker && docker compose up -d --build
#   3. open http://localhost/  (or http://<host-ip>/ from the LAN)
name: songs-offline

services:
  web:
    build:
      context: .
      args:
        WITH_PPTX: "${WITH_PPTX:-1}"
    image: songs-offline-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      # Whole repo — Apache serves public/, Workerman runs websocket-server.php,
      # uploads land in the working tree exactly like on production.
      - ..:/var/www/html
      # Container-specific config overlays the dev app/config.php inside the
      # container only. Generated by tools/offline_sync.sh (git-ignored).
      - ./config.container.php:/var/www/html/app/config.php:ro
    environment:
      TZ: Europe/Riga
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_allowed_packet=64M
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?create docker/.env — tools/offline_sync.sh generates it}"
      MYSQL_DATABASE: songs
      MYSQL_USER: songs
      MYSQL_PASSWORD: "${DB_PASSWORD:?create docker/.env — tools/offline_sync.sh generates it}"
      TZ: Europe/Riga
    volumes:
      - db_data:/var/lib/mysql
      # *.sql / *.sql.gz here are imported ONCE, on first start with an empty
      # db volume (standard mysql image behavior). See initdb/README.md.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      # Host-only access for admin tools (HeidiSQL, db_inspect.py, ...).
      # Not exposed to the LAN.
      - "127.0.0.1:33306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 180
      start_period: 30s

volumes:
  db_data:
