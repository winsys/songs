<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Same-origin WebSocket endpoint, as on production:
    # browsers connect to ws://<host>/ws, Apache tunnels to Workerman on 2345
    # (which binds to 127.0.0.1 inside this same container).
    ProxyPass        "/ws" "ws://127.0.0.1:2345/"
    ProxyPassReverse "/ws" "ws://127.0.0.1:2345/"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
