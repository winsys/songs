<!DOCTYPE html>
<html lang="ru" ng-app="TextApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
    <meta name="csrf-token" content="<?php echo htmlspecialchars(Security::getCsrfToken(), ENT_QUOTES); ?>">
    <title>Текст</title>
    <script type="text/javascript">
        // [SECURITY] WebSocket authentication credentials
        window.WS_USER_ID = <?php echo Security::getCurrentUserId(); ?>;
        window.WS_GROUP_ID = <?php echo Security::getGroupId(); ?>;
        window.WS_AUTH_TOKEN = "<?php echo Security::generateWebSocketToken(); ?>";
    </script>
    <script src="/js/angular.min.js"></script>
    <script src="/js/csrf_interceptor.js"></script>
    <script src="/js/websocket_auth.js"></script>
    <style>
        body {
            margin: 0;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        #wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90vw;
            box-sizing: border-box;
            padding: 20px;
        }

        #text {
            width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
        }

        #title {
            font-size: 3vh;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90vw;
            padding: 10px 20px;
            height: 40px;
            line-height: 40px;
        }
    </style>
</head>
<body ng-controller="TextController" ng-click="enterFullscreen()">
<div id="wrapper">
    <div id="text-container" ng-style="{'height': containerHeight + 'vh'}">
        <div id="text" ng-style="{'font-size': fontSize + 'px'}">{{ text }}</div>
    </div>
    <div id="title" class="ng-binding">{{ songName }}</div>
</div>

<script>
    angular.module('TextApp', ['csrfModule'])
        .controller('TextController', function($scope, $http, $timeout) {
            $scope.text = "";
            $scope.songName = "";
            $scope.fontMaxSize = 64;
            $scope.fontSize = 10;
            $scope.containerHeight = 20;
            $scope.userSettings = null;

            $scope.enterFullscreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                }
            };

            function applyUserSettings(settings) {
                if (settings) {
                    $scope.userSettings = settings;
                    const body = document.body;
                    const textElement = document.getElementById("text");

                    // Apply streaming display settings
                    body.style.backgroundColor = settings.streaming_bg_color || '#000000';
                    body.style.color = settings.streaming_font_color || '#FFFFFF';
                    body.style.fontFamily = settings.streaming_font || 'Arial';

                    if (textElement) {
                        textElement.style.fontFamily = settings.streaming_font || 'Arial';
                    }
                    // Set container height based on percentage (subtract title height ~60px = ~6vh)
                    var titleHeightVh = 6; // Approximate title height in vh
                    $scope.containerHeight = Math.min(settings.streaming_height_percent || 30, 100 - titleHeightVh);
                }
            }

            function adjustTextSize() {
                $timeout(function() {
                    const container = document.getElementById("text-container");
                    const textElement = document.getElementById("text");

                    if (!container || !textElement) return;

                    let maxSize = 100, currentSize = 10;
                    textElement.style.fontSize = currentSize + "px";

                    // Increase font size until text no longer fits
                    while (currentSize < maxSize &&
                    textElement.scrollHeight <= container.clientHeight &&
                    textElement.scrollWidth <= container.clientWidth) {
                        currentSize++;
                        textElement.style.fontSize = currentSize + "px";
                    }

                    // Decrease if text overflows
                    while (textElement.scrollHeight > container.clientHeight || textElement.scrollWidth > container.clientWidth) {
                        currentSize--;
                        textElement.style.fontSize = currentSize + "px";
                        if (currentSize <= 1) break; // Safety check
                    }

                    if (currentSize > $scope.fontMaxSize) currentSize = $scope.fontMaxSize;
                    $scope.fontSize = currentSize;
                    if (!$scope.$$phase) {
                        $scope.$apply();
                    }
                }, 0);
            }

            function fetchText() {
                $http.post('/ajax', { command: "get_image" })
                    .then(function(response) {
                        $http.post('/ajax', { command: "get_user_settings" })
                            .then(function(settingsResponse) {
                                if (settingsResponse.data) {
                                    applyUserSettings(settingsResponse.data);
                                }
                            });
                        if (Array.isArray(response.data) && response.data.length === 0) {
                            $scope.srcText = "";
                            $scope.text = "";
                            $scope.songName = "";
                            // Load settings even when no text to show placeholder
                        } else {
                            if ($scope.srcText !== response.data[0].text) {
                                $scope.srcText = response.data[0].text;
                                let preparedText = response.data[0].text.substring(0, response.data[0].text.length);
                                preparedText = preparedText.replace("$ $", "\r\n-----\r\n");
                                $scope.text = preparedText.replace(/\$(\*{5,})\$/g, (match, stars) => "·".repeat(stars.length));
                                $scope.text = $scope.text.replace("$", "");
                                $scope.songName = response.data[0].song_name;
                                adjustTextSize();
                            }
                        }
                    });
            }

            function initSocket() {
                // [SECURITY] Use authenticated WebSocket connection
                // URL is auto-detected (wss:// for HTTPS, ws:// for HTTP)
                const socket = window.createAuthenticatedWebSocket(
                    null, // Use default /ws endpoint
                    function(data) {
                        // Handle incoming messages (only after authentication)
                        console.log('WebSocket message received:', data);

                        if (data.type === 'update_needed') {
                            $scope.$apply(function() {
                                fetchText();
                            });
                        }
                    },
                    function(error) {
                        console.error('WebSocket error:', error);
                    }
                );

                socket.addEventListener('close', function(event) {
                    console.log('WebSocket closed, reconnecting in 2s...');
                    setTimeout(initSocket, 2000);
                });
            }

            fetchText();
            initSocket();

            angular.element(window).on('load resize', adjustTextSize);
        });
</script>
</body>
</html>
