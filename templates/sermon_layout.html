<!DOCTYPE html>
<html ng-app="Songs" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проповедь</title>
    <script src="/js/angular.min.js" type="text/javascript"></script>
    <style>
        :root {
            --sn-body-bg:      #1a1a1a;
            --sn-notes-bg:     #2b2b2b;
            --sn-notes-header: #222222;
            --sn-notes-border: #444444;
            --sn-select-bg:    #333333;

            --sn-bible-bg:           #0d2040;
            --sn-bible-border:       #1a4a8a;
            --sn-bible-ref:          #64acf0;
            --sn-bible-verse:        #5599e0;
            --sn-bible-hover-bg:     #162e5c;
            --sn-bible-hover-border: #2e72cc;
            --sn-bible-active-bg:    #1e5ab8;
            --sn-bible-active-bdr:   #4d93e8;
            --sn-bible-active-verse: #ddeeff;
            --sn-bible-shadow:       #1a4e9e;

            --sn-msg-bg:           #240d36;
            --sn-msg-border:       #521480;
            --sn-msg-color:        #c070e8;
            --sn-msg-hover-bg:     #361555;
            --sn-msg-hover-border: #8030b8;
            --sn-msg-active-bg:    #6020a8;
            --sn-msg-active-bdr:   #b060e0;
            --sn-msg-shadow:       #5a1890;

            --sn-notes-font:      13pt;
            --sn-chip-font:       10pt;
            --sn-chip-verse-font: 9.5pt;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--sn-body-bg);
            color: #fff;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        #sermon-layout { display: flex; height: 100vh; width: 100vw; }

        /* ===== LEFT: Notes panel ===== */
        #notes-panel {
            width: 50%;
            height: 100vh;
            overflow-y: auto;
            background: var(--sn-notes-bg);
            border-right: 2px solid var(--sn-notes-border);
            display: flex;
            flex-direction: column;
        }

        #notes-header {
            background: var(--sn-notes-header);
            padding: 10px 16px;
            border-bottom: 1px solid var(--sn-notes-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 10px;
        }

        #notes-title {
            font-size: 13pt;
            font-weight: bold;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        #notes-date { font-size: 10pt; color: #888; flex-shrink: 0; }
        #sermon-select-wrap { flex-shrink: 0; }

        #sermon-select {
            background: var(--sn-select-bg);
            color: #ccc;
            border: 1px solid var(--sn-notes-border);
            border-radius: 5px;
            padding: 4px 8px;
            font-size: 10pt;
            cursor: pointer;
            max-width: 180px;
        }

        #notes-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px 40px;
            font-size: var(--sn-notes-font);
            line-height: 1.75;
            color: #e0e0e0;
        }

        /* ===== Bible cite chip ===== */
        #notes-body .bible-cite {
            display: inline-flex;
            align-items: flex-start;
            gap: 6px;
            background: var(--sn-bible-bg);
            border: 1px solid var(--sn-bible-border);
            border-radius: 12px;
            padding: 5px 12px;
            font-size: var(--sn-chip-font);
            color: var(--sn-bible-ref);
            cursor: pointer;
            user-select: none;
            white-space: normal;
            word-break: break-word;
            vertical-align: middle;
            margin: 2px 3px;
            max-width: 100%;
            transition: background 0.15s, border-color 0.15s;
        }
        #notes-body .bible-cite:hover { background: var(--sn-bible-hover-bg); border-color: var(--sn-bible-hover-border); }
        #notes-body .bible-cite.active-cite {
            background: var(--sn-bible-active-bg);
            border-color: var(--sn-bible-active-bdr);
            color: #fff;
            box-shadow: 0 0 0 2px var(--sn-bible-shadow);
        }
        #notes-body .bible-cite .cite-body { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
        #notes-body .bible-cite .cite-ref { font-weight: 700; white-space: nowrap; color: var(--sn-bible-ref); }
        #notes-body .bible-cite.active-cite .cite-ref { color: #fff; }
        #notes-body .bible-cite .cite-verse-text { font-weight: 400; font-size: var(--sn-chip-verse-font); color: var(--sn-bible-verse); opacity: 0.9; line-height: 1.45; }
        #notes-body .bible-cite.active-cite .cite-verse-text { color: var(--sn-bible-active-verse); opacity: 1; }

        /* ===== Message cite chip ===== */
        #notes-body .message-cite {
            display: inline-flex;
            align-items: flex-start;
            background: var(--sn-msg-bg);
            border: 1px solid var(--sn-msg-border);
            border-radius: 10px;
            padding: 4px 12px;
            font-size: var(--sn-chip-font);
            color: var(--sn-msg-color);
            cursor: pointer;
            user-select: none;
            white-space: pre-wrap;
            word-break: break-word;
            vertical-align: middle;
            margin: 2px 3px;
            transition: background 0.15s, border-color 0.15s;
            max-width: 100%;
        }
        #notes-body .message-cite:hover { background: var(--sn-msg-hover-bg); border-color: var(--sn-msg-hover-border); }
        #notes-body .message-cite.active-cite {
            background: var(--sn-msg-active-bg);
            border-color: var(--sn-msg-active-bdr);
            color: #fff;
            box-shadow: 0 0 0 2px var(--sn-msg-shadow);
        }
        #notes-body .message-cite .cite-remove { display: none !important; }
        #notes-body .cite-remove { display: none !important; }

        /* ===== Image in notes ===== */
        #notes-body .sermon-img-wrap {
            display: inline-block; margin: 4px 2px; vertical-align: middle;
            cursor: pointer; border: 2px solid var(--sn-notes-border);
            border-radius: 6px; overflow: hidden; transition: border-color 0.15s;
        }
        #notes-body .sermon-img-wrap:hover { border-color: var(--sn-bible-active-bdr); }
        #notes-body .sermon-img-wrap.active-img { border-color: var(--sn-bible-shadow); box-shadow: 0 0 0 2px var(--sn-bible-shadow); }
        #notes-body .sermon-img-thumb { display: block; max-width: 160px; max-height: 120px; object-fit: cover; }
        #notes-body .sermon-img-remove { display: none !important; }

        /* ===== Font-size controls (left panel) ===== */
        #font-size-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .font-size-btn {
            background: rgba(255,255,255,0.07);
            color: #ccc;
            border: 1px solid var(--sn-notes-border);
            border-radius: 4px;
            min-width: 44px;
            height: 36px;
            font-size: 16pt;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            user-select: none;
            padding: 0;
        }
        .font-size-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .font-size-btn:active { background: rgba(255,255,255,0.28); }

        /* ===== RIGHT: Display panel ===== */
        #display-panel {
            width: 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /*
         * Text wrap is ALWAYS in the DOM and takes the full panel size.
         * This ensures clientHeight/clientWidth are always valid when
         * autoFitText() runs — even when switching from an image to text.
         * The image is positioned absolute on top, so there is no conflict.
         */
        #display-text-wrap {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        #display-text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        /* font-size is set entirely by autoFitText() via el.style — no ng-style */
        #display-text {
            width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
            text-align: center;
            line-height: 1.3;
        }

        #display-title {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            padding: 8px 10px 0;
            color: #aaa;
            flex-shrink: 0;
        }

        /* Image overlay — sits on top of text via z-index */
        #display-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 10;
        }

        #display-empty {
            position: absolute;
            color: #444;
            font-size: 14pt;
            text-align: center;
            z-index: 5;
        }

        #fullscreen-btn {
            position: fixed;
            top: 10px; right: 14px;
            background: rgba(0,0,0,0.5);
            color: #aaa;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 4px 10px;
            font-size: 11pt;
            cursor: pointer;
            z-index: 100;
            transition: background 0.15s;
        }
        #fullscreen-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        .no-sermon-msg { padding: 40px 20px; color: #666; text-align: center; font-size: 12pt; }
    </style>
</head>
<body ng-controller="Sermon">

<div id="sermon-layout">

    <!-- LEFT: Notes panel -->
    <div id="notes-panel">
        <div id="notes-header">
            <div id="notes-title">{{ currentSermon ? currentSermon.TITLE || '(без названия)' : 'Выберите проповедь' }}</div>
            <div id="notes-date">{{ currentSermon ? currentSermon.SERMON_DATE : '' }}</div>
            <div id="sermon-select-wrap">
                <select id="sermon-select" ng-model="selectedSermonId" ng-change="loadSermon(selectedSermonId)">
                    <option value="">— выбрать —</option>
                    <option ng-repeat="s in sermonList" value="{{ s.ID }}">
                        {{ s.TITLE || '(без названия)' }} {{ s.SERMON_DATE ? '(' + s.SERMON_DATE + ')' : '' }}
                    </option>
                </select>
            </div>
            <div id="font-size-controls">
                <button class="font-size-btn" ng-click="changeNotesFontSize(-1)" title="Уменьшить шрифт">−</button>
                <button class="font-size-btn" ng-click="changeNotesFontSize(+1)" title="Увеличить шрифт">+</button>
            </div>
        </div>

        <div id="notes-body" ng-bind-html="notesHtml" ng-if="currentSermon"></div>
        <div class="no-sermon-msg" ng-if="!currentSermon">Выберите проповедь из списка выше</div>
    </div>

    <!-- RIGHT: Display panel -->
    <div id="display-panel">

        <!--
            Text wrap is ALWAYS present (no ng-hide/ng-show) so that
            clientHeight and clientWidth are always valid for autoFitText().
        -->
        <div id="display-text-wrap">
            <div id="display-text-container">
                <!-- font-size controlled entirely by autoFitText(), NOT ng-style -->
                <div id="display-text">{{ displayText }}</div>
            </div>
            <div id="display-title" ng-show="displayTitle">{{ displayTitle }}</div>
        </div>

        <!-- Image overlay (z-index: 10) covers text when visible -->
        <img id="display-image" ng-show="displayImageSrc" ng-src="{{ displayImageSrc }}" />

        <!-- Empty state hint -->
        <div id="display-empty" ng-show="!displayText && !displayImageSrc">
            Нажмите на цитату или изображение
        </div>

    </div>
</div>

<button id="fullscreen-btn" ng-click="toggleFullscreen()">⛶ Полный экран</button>

<script src="/js/sermon.js?v=8" type="text/javascript"></script>
</body>
</html>
