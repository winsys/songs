<!DOCTYPE html>
<html ng-app="Songs" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проповедь</title>
    <script src="/js/angular.min.js" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Two-column layout ===== */
        #sermon-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ===== LEFT: Notes panel ===== */
        #notes-panel {
            width: 50%;
            height: 100vh;
            overflow-y: auto;
            background: #2b2b2b;
            border-right: 2px solid #444;
            display: flex;
            flex-direction: column;
        }

        #notes-header {
            background: #222;
            padding: 10px 16px;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 10px;
        }

        #notes-title {
            font-size: 13pt;
            font-weight: bold;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        #notes-date {
            font-size: 10pt;
            color: #888;
            flex-shrink: 0;
        }

        #sermon-select-wrap {
            flex-shrink: 0;
        }

        #sermon-select {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 4px 8px;
            font-size: 10pt;
            cursor: pointer;
            max-width: 180px;
        }

        #notes-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px 40px;
            font-size: 13pt;
            line-height: 1.75;
            color: #e0e0e0;
        }

        /* ===== Bible cite chip (in notes) ===== */
        #notes-body .bible-cite {
            display: inline-flex;
            align-items: center;
            background: #1a3a5c;
            border: 1px solid #2a6099;
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 10pt;
            color: #7ec8f8;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            vertical-align: middle;
            margin: 2px 3px;
            transition: background 0.15s, border-color 0.15s;
        }
        #notes-body .bible-cite:hover { background: #1e4a78; border-color: #4a90d9; }
        #notes-body .bible-cite.active-cite {
            background: #1e6bbf;
            border-color: #64b5f6;
            color: #fff;
            box-shadow: 0 0 0 2px #1976d2;
        }
        /* Hide the × remove button in sermon mode */
        #notes-body .cite-remove { display: none !important; }

        /* ===== Image in notes ===== */
        #notes-body .sermon-img-wrap {
            display: inline-block;
            margin: 4px 2px;
            vertical-align: middle;
            cursor: pointer;
            border: 2px solid #555;
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        #notes-body .sermon-img-wrap:hover { border-color: #64b5f6; }
        #notes-body .sermon-img-wrap.active-img { border-color: #1976d2; box-shadow: 0 0 0 2px #1976d2; }
        #notes-body .sermon-img-thumb {
            display: block;
            max-width: 160px;
            max-height: 120px;
            object-fit: cover;
        }
        /* Hide remove button in sermon mode */
        #notes-body .sermon-img-remove { display: none !important; }

        /* ===== RIGHT: Display panel ===== */
        #display-panel {
            width: 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* Text display — mirrors text_layout.html */
        #display-text-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 92%;
            height: 92%;
        }

        #display-text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            max-height: 85%;
        }

        #display-text {
            width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
            text-align: center;
        }

        #display-title {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            padding: 8px 10px 0;
            color: #aaa;
        }

        /* Image fullscreen in display panel */
        #display-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        /* Empty state */
        #display-empty {
            color: #444;
            font-size: 14pt;
            text-align: center;
        }

        /* ===== Fullscreen button ===== */
        #fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 14px;
            background: rgba(0,0,0,0.5);
            color: #aaa;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 4px 10px;
            font-size: 11pt;
            cursor: pointer;
            z-index: 100;
            transition: background 0.15s;
        }
        #fullscreen-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        /* ===== Sermon selector dropdown (header) ===== */
        .no-sermon-msg {
            padding: 40px 20px;
            color: #666;
            text-align: center;
            font-size: 12pt;
        }
    </style>
</head>
<body ng-controller="Sermon">

<div id="sermon-layout">

    <!-- ===== LEFT: Notes panel ===== -->
    <div id="notes-panel">
        <div id="notes-header">
            <div id="notes-title">{{ currentSermon ? currentSermon.TITLE || '(без названия)' : 'Выберите проповедь' }}</div>
            <div id="notes-date">{{ currentSermon ? currentSermon.SERMON_DATE : '' }}</div>
            <div id="sermon-select-wrap">
                <select id="sermon-select" ng-model="selectedSermonId" ng-change="loadSermon(selectedSermonId)">
                    <option value="">— выбрать —</option>
                    <option ng-repeat="s in sermonList" value="{{ s.ID }}">{{ s.TITLE || '(без названия)' }} {{ s.SERMON_DATE ? '(' + s.SERMON_DATE + ')' : '' }}</option>
                </select>
            </div>
        </div>

        <div id="notes-body" ng-bind-html="notesHtml" ng-if="currentSermon"></div>
        <div class="no-sermon-msg" ng-if="!currentSermon">
            Выберите проповедь из списка выше
        </div>
    </div>

    <!-- ===== RIGHT: Display panel ===== -->
    <div id="display-panel" id="display-panel">

        <!-- Image mode -->
        <img id="display-image" ng-src="{{ displayImageSrc }}" />

        <!-- Text mode -->
        <div id="display-text-wrap" ng-show="!displayImageSrc">
            <div id="display-text-container">
                <div id="display-text" ng-style="{'font-size': displayFontSize + 'px'}">{{ displayText }}</div>
            </div>
            <div id="display-title" ng-show="displayTitle">{{ displayTitle }}</div>
        </div>

        <!-- Empty -->
        <div id="display-empty" ng-show="!displayText && !displayImageSrc">
            Нажмите на цитату или изображение
        </div>
    </div>

</div>

<!-- Fullscreen button -->
<button id="fullscreen-btn" ng-click="toggleFullscreen()">⛶ Полный экран</button>

<script src="/js/sermon.js?v=2" type="text/javascript"></script>
</body>
</html>
