<!DOCTYPE html>
<html lang="ru" ng-app="TextApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
    <meta name="csrf-token" content="<?php echo htmlspecialchars(Security::getCsrfToken(), ENT_QUOTES); ?>">
    <title>Текст</title>
    <script type="text/javascript">
        // [SECURITY] WebSocket authentication credentials
        window.WS_USER_ID = <?php echo Security::getUserId(); ?>;
        window.WS_GROUP_ID = <?php echo Security::getGroupId(); ?>;
        window.WS_AUTH_TOKEN = "<?php echo Security::generateWebSocketToken(); ?>";
    </script>
    <script src="/js/angular.min.js"></script>
    <script src="/js/csrf_interceptor.js"></script>
    <script src="/js/websocket_auth.js"></script>
    <style>
        body {
            margin: 0;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        #wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 90vh;
            width: 90vw;
        }

        #text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            max-height: 80vh;
        }

        #text {
            width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
        }

        #title {
            font-size: 3vh;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 10px;
            max-width: 90vw;
        }

        /* Placeholder image styling */
        #placeholder-image {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        /* Sermon / tech image overlay — covers everything */
        #overlay-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: black;
            z-index: 10;
        }

        #video-overlay {
            display: none;          /* управляется JS, не ng-show */
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 20;
        }
        #video-overlay iframe,
        #video-overlay video {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body ng-controller="TextController" ng-click="enterFullscreen()">

<!-- Full-screen image overlay (sermon images, tech images) -->
<img id="overlay-image" ng-show="overlayImageSrc" ng-src="{{ overlayImageSrc }}" />

<!-- Full-screen video overlay -->
<div id="video-overlay">
    <!-- заполняется JavaScript-ом -->
</div>

<div id="wrapper">
    <!-- Show text when available -->
    <div id="text-container" ng-if="text">
        <div id="text" ng-style="{'font-size': fontSize + 'px'}">{{ text }}</div>
    </div>
    <div id="title" ng-if="text" class="ng-binding">{{ songName }}</div>
</div>

<script>
    angular.module('TextApp', ['csrfModule'])
        .controller('TextController', function($scope, $http, $timeout, $sce) {
            $scope.text = "";
            $scope.songName = "";
            $scope.fontSize = 10;
            $scope.fontMaxSize = 64;
            $scope.userSettings = null;
            $scope.overlayImageSrc = "";

            $scope.enterFullscreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                }
            };

            function applyUserSettings(settings) {
                if (settings) {
                    $scope.userSettings = settings;
                    const body = document.body;
                    const textElement = document.getElementById("text");

                    // Apply main display settings
                    body.style.backgroundColor = settings.main_bg_color || '#000000';
                    body.style.color = settings.main_font_color || '#FFFFFF';
                    body.style.fontFamily = settings.main_font || 'Arial';

                    if (textElement) {
                        textElement.style.fontFamily = settings.main_font || 'Arial';
                    }
                }
            }

            function adjustTextSize() {
                $timeout(function() {
                    const container = document.getElementById("text-container");
                    const textElement = document.getElementById("text");

                    if (!container || !textElement) return;

                    let maxSize = 100, currentSize = 10;
                    textElement.style.fontSize = currentSize + "px";

                    while (currentSize < maxSize &&
                    textElement.scrollHeight <= container.clientHeight &&
                    textElement.scrollWidth <= container.clientWidth) {
                        currentSize++;
                        textElement.style.fontSize = currentSize + "px";
                    }

                    while (textElement.scrollHeight > container.clientHeight || textElement.scrollWidth > container.clientWidth) {
                        currentSize--;
                        textElement.style.fontSize = currentSize + "px";
                    }

                    if (currentSize > $scope.fontMaxSize) currentSize = $scope.fontMaxSize;
                    $scope.fontSize = currentSize;
                    $scope.$apply();
                }, 0);
            }

            function _ytId(url) {
                var m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
                return m ? m[1] : null;
            }

            function applyVideoState(videoSrc, videoState) {
                if (videoSrc && videoState === 'playing') {

                    var ytId = _ytId(videoSrc);
                    if (ytId) {
                        $scope.videoIsYouTube  = true;
                        $scope.videoEmbedSrc   = $sce.trustAsResourceUrl(
                            'https://www.youtube.com/embed/' + ytId +
                            '?autoplay=1&rel=0&modestbranding=1&enablejsapi=1'
                        );
                        $scope.videoFileSrc    = null;
                    } else {
                        $scope.videoIsYouTube  = false;
                        $scope.videoEmbedSrc   = null;
                        $scope.videoFileSrc    = $sce.trustAsResourceUrl(videoSrc);
                    }
                    $scope.videoOverlaySrc = videoSrc;   // показать оверлей

                    // Скрываем текст и картинку-оверлей
                    $scope.overlayImageSrc = '';
                    $scope.srcText  = '';
                    $scope.text     = '';
                    $scope.songName = '';
                    return true;   // видео обработано, дальше не читать

                } else if (videoState === 'paused') {
                    // Пауза: оверлей остаётся, ставим паузу на видео-элемент
                    var el = document.getElementById('text-video-el');
                    if (el) el.pause();
                    return true;

                } else {
                    // Остановлено или нет видео — скрыть оверлей
                    if ($scope.videoOverlaySrc) {
                        var el2 = document.getElementById('text-video-el');
                        if (el2) { el2.pause(); el2.src = ''; }
                        $scope.videoOverlaySrc = '';
                        $scope.videoIsYouTube  = false;
                        $scope.videoEmbedSrc   = null;
                        $scope.videoFileSrc    = null;
                    }
                    return false;  // продолжать обработку image/text
                }
            }



            var _videoOverlay = null;   // элемент #video-overlay
            var _currentVideoSrc = '';  // текущий src (чтобы не пересоздавать)
            var _currentVideoType = ''; // 'youtube' | 'file' | ''

            function _getOverlay() {
                if (!_videoOverlay) _videoOverlay = document.getElementById('video-overlay');
                return _videoOverlay;
            }

            function _ytId(url) {
                var m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
                return m ? m[1] : null;
            }

            /**
             * Показать видео. Вызывается из fetchText() при video_state='playing'.
             * Если src не изменился — не пересоздаёт DOM (iframe не перезапускается).
             */
            function showVideoOverlay(src) {
                var overlay = _getOverlay();
                if (!overlay) return;

                if (_currentVideoSrc === src) {
                    // Src не изменился — просто убеждаемся что оверлей виден
                    overlay.style.display = 'block';
                    return;
                }

                _currentVideoSrc  = src;
                overlay.innerHTML = '';

                var ytId = _ytId(src);
                if (ytId) {
                    _currentVideoType = 'youtube';
                    var iframe = document.createElement('iframe');
                    iframe.id            = 'yt-player';
                    iframe.src           = 'https://www.youtube.com/embed/' + ytId +
                        '?autoplay=1&rel=0&modestbranding=1&enablejsapi=1';
                    iframe.allow         = 'autoplay; fullscreen';
                    iframe.allowFullscreen = true;
                    overlay.appendChild(iframe);
                } else {
                    _currentVideoType = 'file';
                    var video = document.createElement('video');
                    video.id       = 'file-player';
                    video.src      = src;
                    video.autoplay = true;
                    video.controls = false;
                    video.style.cssText = 'width:100%;height:100%;object-fit:contain;background:#000;';
                    overlay.appendChild(video);
                    video.play().catch(function(e) { console.warn('video.play():', e); });
                }

                overlay.style.display = 'block';

                // Скрываем текст и картинку-оверлей
                var imgOverlay = document.getElementById('overlay-image');
                if (imgOverlay) imgOverlay.style.display = 'none';
            }

            /**
             * Поставить на паузу без скрытия оверлея.
             */
            function pauseVideoOverlay() {
                if (_currentVideoType === 'youtube') {
                    var iframe = document.getElementById('yt-player');
                    if (iframe) {
                        iframe.contentWindow.postMessage(
                            JSON.stringify({ event: 'command', func: 'pauseVideo', args: [] }),
                            '*'
                        );
                    }
                } else if (_currentVideoType === 'file') {
                    var v = document.getElementById('file-player');
                    if (v) v.pause();
                }
            }

            /**
             * Возобновить воспроизведение.
             */
            function resumeVideoOverlay() {
                if (_currentVideoType === 'youtube') {
                    var iframe = document.getElementById('yt-player');
                    if (iframe) {
                        iframe.contentWindow.postMessage(
                            JSON.stringify({ event: 'command', func: 'playVideo', args: [] }),
                            '*'
                        );
                    }
                } else if (_currentVideoType === 'file') {
                    var v = document.getElementById('file-player');
                    if (v) v.play().catch(function(){});
                }
            }

            /**
             * Скрыть оверлей и сбросить состояние.
             */
            function hideVideoOverlay() {
                var overlay = _getOverlay();
                if (overlay) {
                    overlay.style.display = 'none';
                    overlay.innerHTML     = '';
                }
                _currentVideoSrc  = '';
                _currentVideoType = '';

                // Восстанавливаем img overlay (пусть Angular управляет через ng-show)
                var imgOverlay = document.getElementById('overlay-image');
                if (imgOverlay) imgOverlay.style.display = '';
            }


            function fetchText() {
                $http.post('/ajax', { command: 'get_image' })
                    .then(function(response) {

                        // Пустой ответ — сбросить всё
                        if (Array.isArray(response.data) && response.data.length === 0) {
                            $scope.srcText        = '';
                            $scope.text           = '';
                            $scope.songName       = '';
                            $scope.overlayImageSrc = '';
                            hideVideoOverlay();
                            return;
                        }

                        var row = response.data[0];

                        if (row.user_settings) {
                            applyUserSettings(row.user_settings);
                        }

                        // ── ВИДЕО (приоритет над картинкой и текстом) ──────────
                        var videoSrc   = (row.video_src   || '').trim();
                        var videoState = (row.video_state || 'stopped').trim();

                        if (videoSrc) {
                            if (videoState === 'playing') {
                                if (_currentVideoSrc === videoSrc) {
                                    // Тот же источник — просто возобновить
                                    resumeVideoOverlay();
                                } else {
                                    // Новый источник — создать плеер (он стартует с autoplay)
                                    showVideoOverlay(videoSrc);
                                }
                                $scope.overlayImageSrc = '';
                                $scope.text            = '';
                                $scope.songName        = '';
                                return;
                            } else if (videoState === 'paused') {
                                pauseVideoOverlay();
                                return;   // не трогаем текст/картинку
                            } else {
                                // stopped
                                hideVideoOverlay();
                                // продолжаем обработку image/text ниже
                            }
                        } else {
                            // video_src пустой — скрыть если было видео
                            if (_currentVideoSrc) hideVideoOverlay();
                        }

                        // ── КАРТИНКА ───────────────────────────────────────────
                        var imagePath = (row.image || '').trim();
                        var isOverlayImage = (imagePath.indexOf('/sermon_images/') === 0 ||
                            imagePath.indexOf('/tech_media/')    === 0);

                        if (isOverlayImage) {
                            $scope.overlayImageSrc = imagePath;
                            $scope.text            = '';
                            $scope.songName        = '';
                            return;
                        }

                        // ── ТЕКСТ ──────────────────────────────────────────────
                        $scope.overlayImageSrc = '';
                        if ($scope.srcText !== row.text) {
                            $scope.srcText = row.text;
                            var preparedText = (row.text || '').substring(0);
                            preparedText = preparedText.replace('$ $', '\r\n-----\r\n');
                            $scope.text = preparedText.replace(/\$(\*{5,})\$/g, function(match, stars) {
                                return '·'.repeat(stars.length);
                            });
                            $scope.text = $scope.text.replace('$', '');
                            $scope.songName = row.song_name;
                            adjustTextSize();
                        }
                    });
            }

            function initSocket() {
                // [SECURITY] Use authenticated WebSocket connection
                // URL is auto-detected (wss:// for HTTPS, ws:// for HTTP)
                const socket = window.createAuthenticatedWebSocket(
                    null, // Use default /ws endpoint
                    function(data) {
                        // Handle incoming messages (only after authentication)
                        if (data.type === 'update_needed') {
                            $scope.$apply(function() {
                                fetchText();
                            });
                        }
                    },
                    function(error) {
                        console.error('WebSocket error:', error);
                    }
                );

                socket.addEventListener('close', function(event) {
                    console.log('WebSocket closed, reconnecting in 2s...');
                    setTimeout(initSocket, 2000);
                });
            }

            angular.element(window).on('load resize', adjustTextSize);
            initSocket();
            fetchText();
        });
</script>
</body>
</html>
