<!DOCTYPE html>
<html lang="ru" ng-app="TextApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
    <title>Текст</title>
    <script src="/js/angular.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        #wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 90vh;
            width: 90vw;
        }

        #text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            max-height: 80vh;
        }

        #text {
            width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
        }

        #title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 10px;
            max-width: 90vw;
        }

        /* Placeholder image styling */
        #placeholder-image {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        /* Sermon / tech image overlay — covers everything */
        #overlay-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: black;
            z-index: 10;
        }
    </style>
</head>
<body ng-controller="TextController" ng-click="enterFullscreen()">

<!-- Full-screen image overlay (sermon images, tech images) -->
<img id="overlay-image" ng-show="overlayImageSrc" ng-src="{{ overlayImageSrc }}" />

<div id="wrapper">
    <!-- Show text when available -->
    <div id="text-container" ng-if="text">
        <div id="text" ng-style="{'font-size': fontSize + 'px'}">{{ text }}</div>
    </div>
    <div id="title" ng-if="text" class="ng-binding">{{ songName }}</div>
</div>

<script>
    angular.module('TextApp', [])
        .controller('TextController', function($scope, $http, $timeout) {
            $scope.text = "";
            $scope.songName = "";
            $scope.fontSize = 10;
            $scope.fontMaxSize = 64;
            $scope.userSettings = null;
            $scope.overlayImageSrc = "";

            $scope.enterFullscreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                }
            };

            function applyUserSettings(settings) {
                if (settings) {
                    $scope.userSettings = settings;
                    const body = document.body;
                    const textElement = document.getElementById("text");

                    // Apply main display settings
                    body.style.backgroundColor = settings.main_bg_color || '#000000';
                    body.style.color = settings.main_font_color || '#FFFFFF';
                    body.style.fontFamily = settings.main_font || 'Arial';

                    if (textElement) {
                        textElement.style.fontFamily = settings.main_font || 'Arial';
                    }
                }
            }

            function adjustTextSize() {
                $timeout(function() {
                    const container = document.getElementById("text-container");
                    const textElement = document.getElementById("text");

                    if (!container || !textElement) return;

                    let maxSize = 100, currentSize = 10;
                    textElement.style.fontSize = currentSize + "px";

                    while (currentSize < maxSize &&
                    textElement.scrollHeight <= container.clientHeight &&
                    textElement.scrollWidth <= container.clientWidth) {
                        currentSize++;
                        textElement.style.fontSize = currentSize + "px";
                    }

                    while (textElement.scrollHeight > container.clientHeight || textElement.scrollWidth > container.clientWidth) {
                        currentSize--;
                        textElement.style.fontSize = currentSize + "px";
                    }

                    if (currentSize > $scope.fontMaxSize) currentSize = $scope.fontMaxSize;
                    $scope.fontSize = currentSize;
                    $scope.$apply();
                }, 0);
            }

            function fetchText() {
                $http.post('/ajax', { command: "get_image" })
                    .then(function(response) {
                        if (Array.isArray(response.data) && response.data.length === 0) {
                            $scope.srcText = "";
                            $scope.text = "";
                            $scope.songName = "";
                            $scope.overlayImageSrc = "";
                        } else {
                            var row = response.data[0];

                            // Apply user settings
                            if (row.user_settings) {
                                applyUserSettings(row.user_settings);
                            }

                            // Image overlay: any image that is NOT the bible marker
                            // and has no text is treated as a full-screen image
                            var imagePath = row.image || '';

                            // Only show full-screen image overlay for sermon images.
                            // Song images (/images/...) must NEVER trigger the overlay —
                            // they are handled by the musician screen, not the text screen.
                            var isSermonImage = (imagePath.indexOf('/sermon_images/') === 0);

                            if (isSermonImage) {
                                // Sermon image — show full-screen overlay, hide text
                                $scope.overlayImageSrc = imagePath;
                                $scope.text = "";
                                $scope.songName = "";
                            } else {
                                // Text mode (song verse or bible text)
                                $scope.overlayImageSrc = "";
                                if ($scope.srcText !== row.text) {
                                    $scope.srcText = row.text;
                                    let preparedText = (row.text || '').substring(0);
                                    preparedText = preparedText.replace("$ $", "\r\n-----\r\n");
                                    $scope.text = preparedText.replace(/\$(\*{5,})\$/g, (match, stars) => "·".repeat(stars.length));
                                    $scope.text = $scope.text.replace("$", "");
                                    $scope.songName = row.song_name;
                                    adjustTextSize();
                                }
                            }
                        }
                    });
            }

            function initSocket() {
                const socket = new WebSocket("wss://" + window.location.host + "/ws");

                socket.onmessage = function(event) {
                    let data = JSON.parse(event.data);
                    if (data.type === 'update_needed') {
                        $scope.$apply(function() {
                            fetchText();
                        });
                    }
                };

                socket.onclose = function(event) {
                    setTimeout(initSocket, 2000);
                };

                socket.onopen = function(event) {
                    setInterval(() => { socket.send(JSON.stringify({type: 'ping'})); }, 30000);
                };
            }

            angular.element(window).on('load resize', adjustTextSize);
            initSocket();
            fetchText();
        });
</script>
</body>
</html>
