<div ng-controller="Tech" class="container">

    <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12" style="width:100%">
            <div class="row" style="padding-top: 20px">
                <li style="text-align: center;
                        box-shadow: rgba(50, 50, 93, 0.25) 0px 2px 5px -1px, rgba(0, 0, 0, 0.3) 0px 1px 3px -1px;
                        width: 100%; font-size: 12pt"
                    class="btn btn-default btn-lg noHover">Текущие песни для группы: <?php echo $_SESSION['userName'] ?></li>
            </div>
        </div>
    </div>

    <!-- List of active songs -->
    <div class="row">
        <div class="col-sm-6 col-md-6 col-lg-6"
             style="margin-top: 20px; overflow: hidden">

            <div class="row"
                 ng-repeat="listItem in favorites">

                <span class="col-sm-12 col-md-12 col-lg-12 item-text">{{ listItem.dispName }}</span>
                <img class="col-sm-3 col-md-3"
                     ng-src="{{ listItem.imageName }}"
                     ng-click="prepareText(listItem.TEXT, listItem.imageName)"/>


                <span class="btn btn-danger col-sm-1" ng-click="deleteFavoriteItem(listItem.FID, listItem.dispName)">&nbsp;X&nbsp;</span>
                    <span class="col-sm-8 col-md-8 item-text">{{ listItem.dispName }}</span>
                    <img class="col-sm-3 col-md-3"
                         ng-attr-id="{{ 'img' + listItem.ID }}"
                         ng-src="{{ listItem.imageName }}"
                         ng-click="openFullscreen(listItem.ID, listItem.NUM, listItem.LISTID, listItem.SONGID)"/>

                </div>
            </div>

            <div class="row prod-list-item"
                 ng-repeat="listItem in favorites">
                    <span class="btn btn-danger col-sm-1" ng-click="deleteFavoriteItem(listItem.FID, listItem.dispName)">&nbsp;X&nbsp;</span>
                    <span class="col-sm-8 col-md-8 item-text">{{ listItem.dispName }}</span>
                    <img class="col-sm-3 col-md-3"
                         ng-attr-id="{{ 'img' + listItem.ID }}"
                         ng-src="{{ listItem.imageName }}"
                         ng-click="openFullscreen(listItem.ID, listItem.NUM, listItem.LISTID, listItem.SONGID)"/>
            </div>

        </div>

        <div style="margin-bottom: 100px">
            <button class="btn btn-warning btn-lg" style="margin-top: 30px; font-size: 12pt" ng-click="clearFavorites()">Очистить список</button>
        </div>
    </div>


    <div id="list-popup">
        <div class="modal fade list-popup" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-body">
                        <div class="row"
                             style="padding-top: 10px; padding-bottom: 10px; border-bottom: #204d74 solid 1px"
                             ng-repeat="song in songList">
                            <div class="col-xs-9 col-s-9 col-md-9" style="font-size: 16pt">
                                {{ song.dispName }}
                            </div>
                            <div class="col-xs-3 col-s-3 col-md-3">
                                <button class="btn btn-lg" style="font-size: 16pt" ng-click="addSongToFavorites(song.ID)">Выбрать</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div id="add-song-popup">
        <div class="modal fade add-song-popup" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-xs-9 col-s-9 col-md-9" style="font-size: 16pt">
                                <input capture
                                       accept="image/*"
                                       id="imageCapDialog"
                                       type="file"
                                       ng-model="addConfig.image"
                                       change="uploadPhoto(addConfig)" />
                            </div>
                            <div class="col-xs-3 col-s-3 col-md-3">
                                <button class="btn btn-lg" style="font-size: 16pt" ng-click="addSongToFavorites(song.ID)">Выбрать</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div id="confirmation-dialog">
        <div class="modal fade confirmation-dialog" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">{{ confirmationDialogConfig.title }}</h3>
                    </div>
                    <div class="modal-body">
                        <div class="span5" style="font-size: 12pt"><strong>{{ confirmationDialogConfig.message }}</strong></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button"
                                style="font-size: 12pt"
                                class="btn btn-default btn-lg"
                                data-dismiss="modal">Отмена</button>
                        <button type="button"
                                style="font-size: 12pt"
                                ng-repeat="button in confirmationDialogConfig.buttons"
                                ng-click="button.action()"
                                class="btn btn-warning btn-lg">&nbsp;&nbsp;&nbsp;{{ button.label }}&nbsp;&nbsp;&nbsp;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
