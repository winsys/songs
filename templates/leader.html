<style>
    .prod-list-item {
        position: relative;
        margin-top: 5px;
        margin-left: 0px;
        padding-bottom: 3px;
        padding-right: 12px;
        border-bottom: 1px solid #d0d0d0;
    }
    .item-text {
        font-size: 18pt;
        display: inline-block;
        vertical-align: middle;
    }
    input[type=number]::-webkit-inner-spin-button {
        -webkit-appearance: none;
    }
    input[type=number] {
        -moz-appearance: textfield;
        appearance: textfield;
        margin: 0;
    }
    .search-box {
        height: 32pt;
        font-size: 18pt;
    }
    .angucomplete-row {
        padding-top: 10px;
        padding-bottom: 10px;
        font-size: 16pt !important;
    }

    .btn-selected, .btn-list:active, .btn-list:focus, .btn-list:hover {
        background-color: #d9ffd9;
        outline: none;
    }

    /* Responsive button text sizing */
    .btn-list, .btn-primary, .btn-warning {
        white-space: normal;
        word-wrap: break-word;
        line-height: 1.2;
        overflow: hidden;
    }

    .songlist-btn {
        height: 24pt;
        font-size: 11pt;
        border-radius: 5px;
    }

    /* Mobile responsive styles */
    @media (max-width: 768px) {
        .search-box {
            height: 38px;
            font-size: 13pt;
            padding: 6px 8px;
        }

        .item-text {
            font-size: 14pt;
        }

        .angucomplete-row {
            font-size: 14pt !important;
        }

        .col-xs-3, .col-xs-4, .col-xs-5 {
            margin-bottom: 8px;
        }

        .modal-dialog {
            margin: 10px;
            width: auto;
        }

        .btn {
            min-height: 44px;
            padding: 8px 6px;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .prod-list-item .btn-danger {
            font-size: 12pt;
        }
    }

    @media (max-width: 600px) {
        .search-box {
            font-size: 11pt;
            height: 36px;
            padding: 5px 4px;
        }

        .btn {
            font-size: 11pt;
            padding: 6px 4px;
        }
    }

    @media (max-width: 480px) {
        .search-box {
            font-size: 9pt;
            height: 34px;
            padding: 4px 3px;
        }

        .item-text {
            font-size: 11pt;
        }

        .modal-body {
            font-size: 13pt;
        }

        .btn {
            padding: 6px 3px;
            font-size: 9pt;
            min-height: 40px;
        }

        /* Even smaller for very tight spaces */
        .col-xs-3 .btn, .col-xs-4 .btn, .col-xs-5 .btn {
            font-size: 8pt;
        }

        .pull-right {
            float: none !important;
        }
    }

    @media (max-width: 380px) {
        .search-box {
            font-size: 8pt;
            height: 32px;
            padding: 3px 2px;
        }

        .btn {
            font-size: 7.5pt;
            padding: 5px 2px;
        }

        .col-xs-3 .btn, .col-xs-4 .btn, .col-xs-5 .btn {
            font-size: 7pt;
        }
    }

    /* Landscape orientation */
    @media (max-height: 500px) and (orientation: landscape) {
        .search-box {
            height: 32px;
            font-size: 10pt;
        }

        .btn {
            font-size: 10pt;
        }

        [class*="col-"] {
            margin-top: 8pt !important;
        }
    }

    /* Special handling for long text buttons */
    @media (max-width: 480px) {
        .btn-list {
            font-size: 8.5pt;
            padding: 4px 2px;
            line-height: 1.1;
        }
    }

    .song-meta {
        display: block;
        margin-top: 3px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .song-book-name {
        font-size: 10pt;
        color: #888;
    }
    .song-lang-badges {
        display: inline-flex;
        gap: 4px;
    }
    .lang-badge {
        display: inline-block;
        font-size: 8pt;
        font-weight: bold;
        padding: 1px 5px;
        border-radius: 3px;
        line-height: 1.4;
    }
    .lang-ru { background: #d0e8ff; color: #1a5a99; }
    .lang-lt { background: #d4f0d4; color: #2a6a2a; }
    .lang-en { background: #fff0cc; color: #7a5a00; }

    .song-lang-badges {
        display: inline-flex;
        gap: 4px;
        margin-left: 2px;
        vertical-align: middle;
    }
    .lang-badge {
        display: inline-block;
        font-size: 7.5pt;
        font-weight: bold;
        padding: 1px 5px;
        border-radius: 3px;
        line-height: 1.5;
    }
    .lang-ru { background: #d0e8ff; color: #1a5a99; }
    .lang-lt { background: #d4f0d4; color: #2a6a2a; }
    .lang-en { background: #fff0cc; color: #7a5a00; }
    .song-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 2px;
    }
    .song-book-name {
        font-size: 10pt;
        color: #888;
    }
    .angucomplete-description {
        font-size: 9pt;
        color: #888;
    }
</style>

<div ng-controller="Leader" class="container">

    <div class="row">
        <div class="col-xs-3 col-s-3 col-md-3"
             ng-repeat="list in visibleSongLists"
             style="margin-top: 20pt">
            <button class="btn btn-sm btn-default search-box btn-list songlist-btn"
                    ng-class="listId == list.LIST_ID ? 'btn-selected' : ''"
                    style="width: 100%"
                    ng-click="setList(list.LIST_ID)">{{list.LIST_NAME}}</button>
        </div>
        <div class="col-xs-3 col-s-3 col-md-3 pull-right"
             style="margin-top: 20pt">
            <button class="btn btn-sm btn-primary search-box songlist-btn" style="width: 100%" ng-click="openList()">Весь список</button>
        </div>
    </div>

    <!-- Search input -->
    <div class="row">
        <div class="col-s-12 col-md-12 col-xs-12"
             style="margin-top: 20pt; margin-bottom: 10px">
            <angucomplete-alt id="ccf6"
                              placeholder="название или номер"
                              pause="100"
                              local-data=songList
                              search-fields="dispName"
                              title-field="dispName"
                              description-field="langInfo"
                              selected-object="selectedItem"
                              minlength="2"
                              input-class="form-control search-box">
            </angucomplete-alt>
        </div>

        <div class="col-sm-12  col-md-12"
             style="margin-top: 20px; overflow: hidden">

            <div class="row prod-list-item"
                 ng-repeat="listItem in favorites">

                <!-- Кнопка удаления -->
                <span class="btn btn-danger col-sm-1"
                      ng-click="deleteFavoriteItem(listItem.FID, listItem.dispName)">&nbsp;X&nbsp;</span>

                <!-- Название + сборник + языки -->
                <span class="col-sm-8 col-md-8">
                    <span class="item-text">{{ listItem.dispName }}</span>
                    <span class="song-meta">
                        <span class="song-book-name" ng-if="listItem.bookName">{{ listItem.bookName }}</span>
                        <span class="song-lang-badges">
                            <span class="lang-badge lang-ru" ng-if="listItem.hasTextRu == '1'">RU</span>
                            <span class="lang-badge lang-lt" ng-if="listItem.hasTextLt == '1'">LT</span>
                            <span class="lang-badge lang-en" ng-if="listItem.hasTextEn == '1'">EN</span>
                        </span>
                    </span>
                </span>

                <!-- Картинка с нотами -->
                <img class="col-sm-3 col-md-3"
                     ng-attr-id="{{ 'img' + listItem.ID }}"
                     ng-src="{{ listItem.imageName }}"
                     ng-click="openFullscreen(listItem.ID, listItem.NUM, listItem.LISTID, listItem.SONGID)"/>
            </div>


        </div>

        <div style="margin-bottom: 100px">
            <button class="btn btn-warning btn-lg" style="margin-top: 30px; font-size: 12pt" ng-click="clearFavorites()">Очистить список</button>
        </div>
    </div>


    <div id="list-popup">
        <div class="modal fade list-popup" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-body">
                        <div class="row"
                             style="padding-top: 10px; padding-bottom: 10px; border-bottom: #204d74 solid 1px"
                             ng-repeat="song in songList">
                            <div class="col-xs-9 col-s-9 col-md-9" style="font-size: 16pt">
                                {{ song.dispName }}
                            </div>
                            <div class="col-xs-3 col-s-3 col-md-3">
                                <button class="btn btn-lg" style="font-size: 16pt" ng-click="addSongToFavorites(song.ID)">Выбрать</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div id="add-song-popup">
        <div class="modal fade add-song-popup" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-xs-9 col-s-9 col-md-9" style="font-size: 16pt">
                                <input capture
                                       accept="image/*"
                                       id="imageCapDialog"
                                       type="file"
                                       ng-model="addConfig.image"
                                       change="uploadPhoto(addConfig)" />
                            </div>
                            <div class="col-xs-3 col-s-3 col-md-3">
                                <button class="btn btn-lg" style="font-size: 16pt" ng-click="addSongToFavorites(song.ID)">Выбрать</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div id="confirmation-dialog">
        <div class="modal fade confirmation-dialog" role="dialog">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">{{ confirmationDialogConfig.title }}</h3>
                    </div>
                    <div class="modal-body">
                        <div class="span5" style="font-size: 12pt"><strong>{{ confirmationDialogConfig.message }}</strong></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button"
                                style="font-size: 12pt"
                                class="btn btn-default btn-lg"
                                data-dismiss="modal">Отмена</button>
                        <button type="button"
                                style="font-size: 12pt"
                                ng-repeat="button in confirmationDialogConfig.buttons"
                                ng-click="button.action()"
                                class="btn btn-warning btn-lg">&nbsp;&nbsp;&nbsp;{{ button.label }}&nbsp;&nbsp;&nbsp;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="/js/leader.js?v=10027" type="text/javascript"></script>

<script type="text/javascript">
    function forceFullScreen(){}
</script>
